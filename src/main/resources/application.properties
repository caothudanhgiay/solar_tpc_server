spring.application.name=solar_tpc_server

#Mac dinh lay profile dev
spring.profiles.active=dev
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# ============================================================
# Distributed Tracing: Spring Boot 4 + OpenTelemetry + Zipkin
# ============================================================
# 1. Lấy mẫu 100% request (dùng cho dev/debug)
management.tracing.sampling.probability=1.0

# 2. Địa chỉ Zipkin server (native Zipkin endpoint /api/v2/spans)
management.zipkin.tracing.endpoint=http://localhost:9412/api/v2/spans

# 3. Expose tất cả Actuator endpoints (để debug - xóa khi production)
management.endpoints.web.exposure.include=*

# JWT Configuration
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
