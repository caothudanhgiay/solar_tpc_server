# Cấu hình môi trường PRODUCTION (Docker)
# Sử dụng biến môi trường để dễ dàng cấu hình khi chạy Docker container
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:solar_tpc}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_prod_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
# Trong môi trường production ban đầu, nên đặt là update để tự tạo bảng
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS Allowed Origins
app.cors.allowed-origins=http://tpcsolar.vn,https://tpcsolar.vn

# Gemini AI Configuration
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=gemini-3.5-flash